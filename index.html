<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Álbum de Boda · Elizabeth & Juan Carlos</title>

<!-- Google Fonts + Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --gold: #e4b363;
  --gold-light: #f5d589;
  --gold-dark: #c49a3a;
  --blue-deep: #0a1a2f;
  --blue-mid: #0f2a44;
  --dark-bg: #050d18;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: var(--dark-bg);
  color: #fef7e8;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Fondo animado */
.hero-bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
}

.bg-layer {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.35) contrast(1.1);
}

.bg-layer-1 {
  background-image: url('https://images.pexels.com/photos/3171837/pexels-photo-3171837.jpeg?auto=compress&cs=tinysrgb&w=1600');
  animation: slowZoom 30s ease-in-out infinite alternate;
}

.bg-layer-2 {
  background-image: url('https://images.pexels.com/photos/2609220/pexels-photo-2609220.jpeg?auto=compress&cs=tinysrgb&w=1600');
  opacity: 0.5;
  animation: slowZoomReverse 35s ease-in-out infinite alternate;
}

@keyframes slowZoom {
  0% { transform: scale(1); }
  100% { transform: scale(1.08); }
}

@keyframes slowZoomReverse {
  0% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, rgba(5,13,24,0.75) 0%, rgba(10,26,47,0.6) 100%);
  backdrop-filter: blur(2px);
  z-index: -1;
}

/* Header */
.header {
  background: rgba(10, 26, 47, 0.85);
  backdrop-filter: blur(15px);
  padding: 1.5rem 2rem;
  text-align: center;
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  color: var(--gold);
  letter-spacing: 4px;
}

.header p {
  font-size: 0.85rem;
  opacity: 0.8;
  margin-top: 5px;
}

/* Contenedor */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
}

/* Tarjeta de subida */
.upload-card {
  background: rgba(5, 13, 24, 0.7);
  backdrop-filter: blur(12px);
  border-radius: 48px;
  border: 1px solid rgba(228, 179, 99, 0.4);
  padding: 2rem;
  margin-bottom: 2rem;
  text-align: center;
}

.upload-card h2 {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 0.8rem;
}

.upload-area {
  border: 2px dashed var(--gold);
  border-radius: 32px;
  padding: 2rem;
  margin: 1.5rem 0;
  cursor: pointer;
  transition: all 0.3s;
  background: rgba(0, 0, 0, 0.3);
}

.upload-area:hover {
  background: rgba(228, 179, 99, 0.08);
  border-color: var(--gold-light);
}

.upload-area i {
  font-size: 3rem;
  color: var(--gold);
  margin-bottom: 1rem;
}

#fileInput {
  display: none;
}

.preview-container {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  margin: 15px 0;
  justify-content: center;
}

.preview-item {
  position: relative;
  width: 100px;
  height: 100px;
  border-radius: 16px;
  overflow: hidden;
  border: 2px solid var(--gold);
}

.preview-item img, .preview-item video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.preview-item .remove-btn {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(0,0,0,0.7);
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #ff6b6b;
  font-size: 11px;
}

.message-input {
  width: 100%;
  padding: 12px 20px;
  border-radius: 60px;
  border: 1.5px solid var(--gold);
  background: rgba(255,255,255,0.06);
  color: white;
  margin: 15px 0;
  font-family: 'Montserrat', sans-serif;
}

.btn-submit {
  background: linear-gradient(135deg, var(--gold), var(--gold-dark));
  border: none;
  padding: 12px 40px;
  border-radius: 60px;
  color: var(--blue-deep);
  font-weight: bold;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s;
}

.btn-submit:hover {
  transform: scale(1.02);
  box-shadow: 0 10px 25px -8px rgba(228,179,99,0.4);
}

/* Galería */
.gallery-section {
  background: rgba(10, 26, 47, 0.55);
  backdrop-filter: blur(10px);
  border-radius: 48px;
  padding: 2rem;
}

.gallery-section h2 {
  font-family: 'Cinzel', serif;
  font-size: 1.8rem;
  color: var(--gold);
  text-align: center;
  margin-bottom: 1.5rem;
}

.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

.gallery-item {
  background: rgba(0, 0, 0, 0.45);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(228, 179, 99, 0.3);
  transition: all 0.3s;
  cursor: pointer;
  position: relative;
}

.gallery-item:hover {
  transform: translateY(-5px);
  border-color: var(--gold);
}

.gallery-item img, .gallery-item video {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.gallery-item .caption {
  padding: 10px;
  font-size: 0.8rem;
  text-align: center;
  color: var(--gold-light);
  background: rgba(10, 26, 47, 0.85);
}

/* Botón de admin flotante */
.admin-btn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: var(--blue-deep);
  border: 1px solid var(--gold);
  border-radius: 60px;
  padding: 12px 20px;
  cursor: pointer;
  z-index: 200;
  transition: 0.3s;
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  color: var(--gold);
}

.admin-btn:hover {
  background: var(--gold);
  color: var(--blue-deep);
}

/* Modal admin */
.admin-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 13, 24, 0.98);
  backdrop-filter: blur(15px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}

.admin-modal.active {
  display: flex;
}

.admin-panel {
  background: rgba(10, 26, 47, 0.95);
  border-radius: 32px;
  border: 2px solid var(--gold);
  padding: 2rem;
  max-width: 600px;
  width: 90%;
  text-align: center;
}

.admin-panel h3 {
  color: var(--gold);
  margin-bottom: 1rem;
}

.admin-panel input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 60px;
  border: 1px solid var(--gold);
  background: rgba(255,255,255,0.1);
  color: white;
}

.admin-panel button {
  background: var(--gold);
  border: none;
  padding: 10px 25px;
  border-radius: 60px;
  margin-top: 10px;
  cursor: pointer;
  font-weight: bold;
}

.remember-check {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 10px 0;
}

.remember-check input {
  width: auto;
  margin: 0;
}

.admin-list {
  max-height: 300px;
  overflow-y: auto;
  margin: 15px 0;
  text-align: left;
}

.admin-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  border-bottom: 1px solid rgba(228,179,99,0.3);
}

.admin-item button {
  padding: 5px 12px;
  font-size: 0.8rem;
  margin-left: 5px;
}

.btn-approve { background: #4caf50; color: white; border: none; border-radius: 20px; cursor: pointer; }
.btn-reject { background: #ff6b6b; color: white; border: none; border-radius: 20px; cursor: pointer; }
.btn-delete { background: #ff6b6b; color: white; border: none; border-radius: 20px; cursor: pointer; }

/* Modal de visualización */
.modal-view {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 13, 24, 0.98);
  backdrop-filter: blur(15px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.modal-view.active {
  display: flex;
}

.modal-view img, .modal-view video {
  max-width: 90%;
  max-height: 85vh;
  border-radius: 20px;
  border: 3px solid var(--gold);
}

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--gold);
  color: var(--blue-deep);
  padding: 10px 25px;
  border-radius: 60px;
  font-weight: bold;
  z-index: 1002;
  animation: fadeUp 0.3s;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.back-btn {
  display: inline-block;
  margin-top: 1.5rem;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold);
  padding: 8px 20px;
  border-radius: 60px;
  transition: 0.3s;
}

.back-btn:hover {
  background: var(--gold);
  color: var(--blue-deep);
}

.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--gold);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 650px) {
  .container { padding: 1rem; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .admin-btn { padding: 8px 15px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<div class="hero-bg">
  <div class="bg-layer bg-layer-1"></div>
  <div class="bg-layer bg-layer-2"></div>
</div>
<div class="overlay"></div>

<div class="header">
  <h1><i class="fas fa-camera-retro"></i> Elizabeth & Juan Carlos</h1>
  <p>Comparte tus fotos y videos del día más especial</p>
</div>

<div class="container">
  <div class="upload-card">
    <h2><i class="fas fa-cloud-upload-alt"></i> Sube tu recuerdo</h2>
    <div class="upload-area" id="uploadArea">
      <i class="fas fa-camera"></i>
      <p>Haz clic o arrastra tus archivos aquí</p>
      <p style="font-size: 0.75rem;">Fotos y videos · Máx 50MB</p>
    </div>
    <input type="file" id="fileInput" multiple accept="image/*,video/mp4,video/quicktime">
    <div id="previewList" class="preview-container"></div>
    <input type="text" id="messageInput" class="message-input" placeholder="✍️ Tu nombre y mensaje para los novios...">
    <button class="btn-submit" id="submitBtn"><i class="fas fa-heart"></i> Compartir recuerdo</button>
  </div>

  <div class="gallery-section">
    <h2><i class="fas fa-images"></i> Álbum de recuerdos</h2>
    <div id="galleryGrid" class="gallery-grid">
      <div style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-pulse"></i> Cargando...</div>
    </div>
    <div style="text-align: center;">
      <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Volver a la invitación</a>
    </div>
  </div>
</div>

<button class="admin-btn" id="adminBtn"><i class="fas fa-lock"></i> Administrar</button>

<div id="adminModal" class="admin-modal">
  <div class="admin-panel">
    <h3><i class="fas fa-crown"></i> Panel de Administración</h3>
    <div id="loginSection">
      <input type="password" id="adminPassword" placeholder="Contraseña de administrador">
      <div class="remember-check">
        <input type="checkbox" id="rememberMe" checked> <label for="rememberMe">Recordar sesión (no volver a pedir contraseña)</label>
      </div>
      <button id="loginAdminBtn">Ingresar</button>
    </div>
    <div id="adminContent" style="display:none;">
      <h4>📋 Pendientes de aprobación</h4>
      <div id="pendingList" class="admin-list"></div>
      <h4>✅ Aprobados</h4>
      <div id="approvedList" class="admin-list"></div>
      <button id="closeAdminBtn" style="background:#555;">Cerrar</button>
    </div>
  </div>
</div>

<div id="viewModal" class="modal-view">
  <div id="viewContent"></div>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
const ADMIN_PASSWORD = "boda2026";  // 🔐 Cambia esta contraseña
// API key pública de ImgBB (funciona sin registro)
const IMGBB_API_KEY = "6d207e02198a847aa98d0a2a901485a5";

// ==================== ESTRUCTURA DE DATOS ====================
let pendingMemories = [];
let approvedMemories = [];

// Verificar sesión de administrador
function checkAdminSession() {
  const savedSession = localStorage.getItem('admin_session');
  if (savedSession === 'true') {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    renderAdminPanels();
    return true;
  }
  return false;
}

function saveAdminSession(remember) {
  if (remember) {
    localStorage.setItem('admin_session', 'true');
  }
}

// Cargar datos desde localStorage
function loadData() {
  const pending = localStorage.getItem('wedding_pending_cloud');
  const approved = localStorage.getItem('wedding_approved_cloud');
  if (pending) pendingMemories = JSON.parse(pending);
  if (approved) approvedMemories = JSON.parse(approved);
  renderGallery();
}

function saveData() {
  localStorage.setItem('wedding_pending_cloud', JSON.stringify(pendingMemories));
  localStorage.setItem('wedding_approved_cloud', JSON.stringify(approvedMemories));
}

// ==================== SUBIR A LA NUBE (ImgBB) ====================
async function uploadToCloud(file) {
  return new Promise((resolve, reject) => {
    const formData = new FormData();
    formData.append('image', file);
    formData.append('key', IMGBB_API_KEY);
    
    fetch('https://api.imgbb.com/1/upload', {
      method: 'POST',
      body: formData
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        resolve({ url: data.data.url, deleteUrl: data.data.delete_url });
      } else {
        reject(new Error('Error al subir a la nube: ' + JSON.stringify(data)));
      }
    })
    .catch(reject);
  });
}

// ==================== MANEJO DE ARCHIVOS ====================
let selectedFiles = [];
let previewElements = [];

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const previewList = document.getElementById('previewList');
const messageInput = document.getElementById('messageInput');
const submitBtn = document.getElementById('submitBtn');

uploadArea.addEventListener('click', () => fileInput.click());
uploadArea.addEventListener('dragover', (e) => e.preventDefault());
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  addFiles(Array.from(e.dataTransfer.files));
});

fileInput.addEventListener('change', (e) => {
  addFiles(Array.from(e.target.files));
  fileInput.value = '';
});

function addFiles(files) {
  files.forEach(file => {
    if (!file.type.startsWith('image/') && !file.type.startsWith('video/')) return;
    if (file.size > 50 * 1024 * 1024) {
      alert(`❌ ${file.name} es muy grande (máx 50MB)`);
      return;
    }
    selectedFiles.push(file);
    createPreview(file);
  });
}

function createPreview(file) {
  const div = document.createElement('div');
  div.className = 'preview-item';
  const index = selectedFiles.length - 1;
  
  if (file.type.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    div.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = URL.createObjectURL(file);
    video.muted = true;
    video.addEventListener('mouseenter', () => video.play());
    video.addEventListener('mouseleave', () => video.pause());
    div.appendChild(video);
  }
  
  const removeBtn = document.createElement('div');
  removeBtn.className = 'remove-btn';
  removeBtn.innerHTML = '<i class="fas fa-times"></i>';
  removeBtn.onclick = () => {
    selectedFiles.splice(index, 1);
    div.remove();
  };
  div.appendChild(removeBtn);
  previewList.appendChild(div);
  previewElements.push(div);
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<i class="fas fa-heart"></i> ${msg}`;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// Enviar recuerdo con subida a la nube
submitBtn.addEventListener('click', async () => {
  if (selectedFiles.length === 0) {
    alert("📸 Selecciona al menos una foto o video");
    return;
  }
  const message = messageInput.value.trim();
  if (!message) {
    alert("✍️ Escribe tu nombre y un mensaje");
    return;
  }
  
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Subiendo a la nube...';
  
  try {
    const uploadedFiles = [];
    for (const file of selectedFiles) {
      const result = await uploadToCloud(file);
      uploadedFiles.push({
        type: file.type.startsWith('image/') ? 'image' : 'video',
        url: result.url,
        deleteUrl: result.deleteUrl,
        name: file.name
      });
    }
    
    const newMemory = {
      id: Date.now(),
      files: uploadedFiles,
      message: message,
      date: new Date().toISOString()
    };
    pendingMemories.unshift(newMemory);
    saveData();
    
    // Limpiar
    selectedFiles = [];
    previewElements.forEach(el => el.remove());
    previewElements = [];
    messageInput.value = '';
    showToast('✨ ¡Gracias! Tu recuerdo ha sido enviado a la nube y será revisado');
  } catch (error) {
    console.error(error);
    alert('❌ Error al subir a la nube. Intenta de nuevo.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<i class="fas fa-heart"></i> Compartir recuerdo';
  }
});

// ==================== GALERÍA PÚBLICA ====================
function renderGallery() {
  const galleryGrid = document.getElementById('galleryGrid');
  if (approvedMemories.length === 0) {
    galleryGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem;">
      <i class="fas fa-camera" style="font-size:3rem; opacity:0.5;"></i>
      <p>✨ Pronto aparecerán los recuerdos de nuestros invitados ✨</p>
      <p style="font-size:0.8rem; margin-top:10px;">¡Sé el primero en compartir tu foto!</p>
    </div>`;
    return;
  }
  
  let html = '';
  approvedMemories.forEach(mem => {
    const firstFile = mem.files[0];
    html += `
      <div class="gallery-item" data-type="${firstFile.type}" data-url="${firstFile.url}">
        ${firstFile.type === 'image' ? `<img src="${firstFile.url}" loading="lazy">` : `<video src="${firstFile.url}" preload="metadata"></video>`}
        <div class="caption"><i class="fas fa-heart"></i> ${escapeHtml(mem.message.substring(0, 80))}</div>
      </div>
    `;
  });
  galleryGrid.innerHTML = html;
  
  document.querySelectorAll('.gallery-item').forEach(item => {
    item.addEventListener('click', () => {
      openViewModal(item.dataset.type, item.dataset.url);
    });
  });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ==================== ADMINISTRACIÓN ====================
const adminBtn = document.getElementById('adminBtn');
const adminModal = document.getElementById('adminModal');
const adminPassword = document.getElementById('adminPassword');
const loginAdminBtn = document.getElementById('loginAdminBtn');
const adminContent = document.getElementById('adminContent');
const closeAdminBtn = document.getElementById('closeAdminBtn');
const rememberMe = document.getElementById('rememberMe');
const loginSection = document.getElementById('loginSection');

if (checkAdminSession()) {}

adminBtn.addEventListener('click', () => {
  adminModal.classList.add('active');
  if (localStorage.getItem('admin_session') === 'true') {
    loginSection.style.display = 'none';
    adminContent.style.display = 'block';
    renderAdminPanels();
  } else {
    loginSection.style.display = 'block';
    adminContent.style.display = 'none';
    adminPassword.value = '';
  }
});

loginAdminBtn.addEventListener('click', () => {
  if (adminPassword.value === ADMIN_PASSWORD) {
    saveAdminSession(rememberMe.checked);
    loginSection.style.display = 'none';
    adminContent.style.display = 'block';
    renderAdminPanels();
    showToast('✅ Sesión iniciada');
  } else {
    alert('❌ Contraseña incorrecta');
  }
});

closeAdminBtn.addEventListener('click', () => {
  adminModal.classList.remove('active');
});

function renderAdminPanels() {
  const pendingListDiv = document.getElementById('pendingList');
  if (pendingMemories.length === 0) {
    pendingListDiv.innerHTML = '<p style="color:#aaa; text-align:center;">✨ No hay recuerdos pendientes</p>';
  } else {
    let html = '';
    pendingMemories.forEach((mem) => {
      html += `
        <div class="admin-item">
          <span style="font-size:0.8rem;">📸 ${escapeHtml(mem.message.substring(0, 40))}</span>
          <div>
            <button class="btn-approve" onclick="approveMemory(${mem.id})">✓ Aprobar</button>
            <button class="btn-reject" onclick="rejectMemory(${mem.id})">✗ Rechazar</button>
          </div>
        </div>
      `;
    });
    pendingListDiv.innerHTML = html;
  }
  
  const approvedListDiv = document.getElementById('approvedList');
  if (approvedMemories.length === 0) {
    approvedListDiv.innerHTML = '<p style="color:#aaa; text-align:center;">📷 No hay recuerdos aprobados aún</p>';
  } else {
    let html = '';
    approvedMemories.forEach((mem) => {
      html += `
        <div class="admin-item">
          <span style="font-size:0.8rem;">✅ ${escapeHtml(mem.message.substring(0, 40))}</span>
          <button class="btn-delete" onclick="deleteApprovedMemory(${mem.id})">🗑 Eliminar</button>
        </div>
      `;
    });
    approvedListDiv.innerHTML = html;
  }
}

// Funciones globales para admin
window.approveMemory = function(id) {
  const index = pendingMemories.findIndex(m => m.id === id);
  if (index !== -1) {
    const approved = pendingMemories.splice(index, 1)[0];
    approvedMemories.unshift(approved);
    saveData();
    renderGallery();
    renderAdminPanels();
    showToast('✅ Recuerdo aprobado y visible en la galería');
  }
};

window.rejectMemory = function(id) {
  const index = pendingMemories.findIndex(m => m.id === id);
  if (index !== -1) {
    pendingMemories.splice(index, 1);
    saveData();
    renderAdminPanels();
    showToast('🗑️ Recuerdo rechazado');
  }
};

window.deleteApprovedMemory = function(id) {
  const index = approvedMemories.findIndex(m => m.id === id);
  if (index !== -1) {
    approvedMemories.splice(index, 1);
    saveData();
    renderGallery();
    renderAdminPanels();
    showToast('🗑️ Recuerdo eliminado de la galería');
  }
};

// ==================== MODAL DE VISUALIZACIÓN ====================
const viewModal = document.getElementById('viewModal');
const viewContent = document.getElementById('viewContent');

function openViewModal(type, url) {
  viewContent.innerHTML = '';
  if (type === 'image') {
    const img = document.createElement('img');
    img.src = url;
    viewContent.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    video.autoplay = true;
    viewContent.appendChild(video);
  }
  viewModal.classList.add('active');
}

viewModal.addEventListener('click', () => {
  viewModal.classList.remove('active');
  viewContent.innerHTML = '';
});
